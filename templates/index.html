<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuelRoute — Smarter Road Trip Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────── */
    :root {
      --asphalt:   #0f1117;
      --asphalt-2: #181c27;
      --asphalt-3: #252a38;
      --lane:      #2e3447;
      --stripe:    #f5c842;   /* road-stripe yellow — the signature accent */
      --stripe-dim:#c49d28;
      --fuel-green:#3ddc84;
      --danger:    #ff5c5c;
      --text:      #eaecf4;
      --text-muted:#7c869e;
      --border:    rgba(255,255,255,.07);
      --radius:    10px;
      --font-head: 'Space Grotesk', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--asphalt);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--asphalt-2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--stripe);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .logo-text span { color: var(--stripe); }

    /* ── Main layout ───────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 400px 1fr;
      grid-template-rows: 1fr;
      height: calc(100vh - 65px);
    }

    /* ── Left panel ────────────────────────────────── */
    .panel {
      background: var(--asphalt-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-inner {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--lane) transparent;
    }
    .panel-inner::-webkit-scrollbar { width: 4px; }
    .panel-inner::-webkit-scrollbar-thumb { background: var(--lane); border-radius: 4px; }

    /* ── Form ──────────────────────────────────────── */
    .form-section { margin-bottom: 28px; }

    .form-label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }
    input[type="text"] {
      width: 100%;
      background: var(--asphalt-3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-head);
      font-size: .9rem;
      padding: 11px 14px 11px 38px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus {
      border-color: var(--stripe);
    }
    input[type="text"]::placeholder { color: var(--text-muted); }

    .route-connector {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      margin: -4px 0;
    }
    .dot-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin-left: 19px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.start { background: var(--fuel-green); }
    .dot.end   { background: var(--stripe); }
    .dash-line { width: 1px; height: 22px; background: var(--lane); }

    /* Fuel type selector */
    .fuel-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .fuel-tab {
      background: var(--asphalt-3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-head);
      font-size: .78rem;
      font-weight: 500;
      padding: 8px 4px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .fuel-tab:hover { border-color: var(--stripe); color: var(--text); }
    .fuel-tab.active {
      background: var(--stripe);
      border-color: var(--stripe);
      color: var(--asphalt);
      font-weight: 700;
    }

    /* Submit button */
    .btn-plan {
      width: 100%;
      background: var(--stripe);
      color: var(--asphalt);
      font-family: var(--font-head);
      font-size: .95rem;
      font-weight: 700;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, transform .1s;
      margin-top: 4px;
    }
    .btn-plan:hover { background: #f0bd2a; }
    .btn-plan:active { transform: scale(.98); }
    .btn-plan:disabled { background: var(--lane); color: var(--text-muted); cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: var(--asphalt);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-plan.loading .spinner { display: block; }
    .btn-plan.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ───────────────────────────────────── */
    .results { display: none; }
    .results.visible { display: block; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* Trip summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--asphalt-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .stat-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-value.accent { color: var(--stripe); }
    .stat-value.green  { color: var(--fuel-green); }

    /* Total cost hero */
    .cost-hero {
      background: linear-gradient(135deg, var(--asphalt-3), var(--lane));
      border: 1px solid var(--stripe);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cost-hero-label {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .cost-hero-value {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      color: var(--stripe);
    }
    .fuel-pump-icon { font-size: 2rem; }

    /* Fuel stops list */
    .stops-header {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .stop-card {
      background: var(--asphalt-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 12px;
      align-items: start;
      position: relative;
      overflow: hidden;
    }
    .stop-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--stripe);
    }

    .stop-number {
      width: 36px; height: 36px;
      background: var(--stripe);
      color: var(--asphalt);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: .85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .stop-body {}
    .stop-name {
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 3px;
      line-height: 1.3;
    }
    .stop-location {
      font-size: .78rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stop-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stop-pill {
      font-family: var(--font-mono);
      font-size: .72rem;
      background: var(--lane);
      padding: 3px 8px;
      border-radius: 20px;
      color: var(--text-muted);
    }
    .stop-pill.price { color: var(--fuel-green); }

    .stop-cost {
      text-align: right;
    }
    .stop-cost-value {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--stripe);
    }
    .stop-cost-gallons {
      font-size: .72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Error state */
    .error-box {
      display: none;
      background: rgba(255, 92, 92, .1);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--danger);
      font-size: .88rem;
      margin-top: 12px;
    }
    .error-box.visible { display: block; }

    /* ── Map ───────────────────────────────────────── */
    #map {
      flex: 1;
      z-index: 1;
    }

    .map-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--asphalt);
      color: var(--text-muted);
    }
    .map-placeholder-icon { font-size: 4rem; opacity: .3; }
    .map-placeholder-text {
      font-size: .9rem;
      text-align: center;
      max-width: 200px;
      line-height: 1.5;
    }

    /* Leaflet dark override */
    .leaflet-tile { filter: brightness(.85) saturate(.8) hue-rotate(5deg); }
    .leaflet-control-attribution { background: rgba(15,17,23,.7) !important; color: var(--text-muted) !important; }
    .leaflet-control-attribution a { color: var(--stripe) !important; }

    /* Custom marker */
    .fuel-marker {
      background: var(--stripe);
      color: var(--asphalt);
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
      width: 28px; height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--asphalt);
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .fuel-marker span { transform: rotate(45deg); }

    .endpoint-marker {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 3px solid var(--asphalt);
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .endpoint-marker.start { background: var(--fuel-green); }
    .endpoint-marker.end   { background: var(--stripe); }

    /* Responsive */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: calc(100vh - 65px);
      }
      .panel { max-height: 65vh; }
      #map { height: 50vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">⛽</div>
  <div class="logo-text">Fuel<span>Route</span></div>
</header>

<main>
  <!-- ── Left Panel ── -->
  <aside class="panel">
    <div class="panel-inner">

      <!-- Form -->
      <div class="form-section">
        <label class="form-label">Route</label>

        <div class="input-wrap">
          <span class="input-icon">🟢</span>
          <input type="text" id="start" placeholder="Start — e.g. Dallas, TX" />
        </div>

        <div class="route-connector">
          <div class="dot-line">
            <div class="dot start"></div>
            <div class="dash-line"></div>
            <div class="dot end"></div>
          </div>
        </div>

        <div class="input-wrap">
          <span class="input-icon">🏁</span>
          <input type="text" id="finish" placeholder="Destination — e.g. Chicago, IL" />
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">Fuel Type</label>
        <div class="fuel-tabs">
          <button class="fuel-tab active" data-fuel="regular">Regular</button>
          <button class="fuel-tab" data-fuel="midgrade">Mid</button>
          <button class="fuel-tab" data-fuel="premium">Premium</button>
          <button class="fuel-tab" data-fuel="diesel">Diesel</button>
        </div>
      </div>

      <button class="btn-plan" id="planBtn">
        <div class="spinner"></div>
        <span class="btn-label">Plan My Route →</span>
      </button>

      <div class="error-box" id="errorBox"></div>

      <!-- Results -->
      <div class="results" id="results">
        <div class="divider"></div>

        <div class="cost-hero">
          <div>
            <div class="cost-hero-label">Total Fuel Cost</div>
            <div class="cost-hero-value" id="totalCost">—</div>
          </div>
          <div class="fuel-pump-icon">⛽</div>
        </div>

        <div class="summary-grid">
          <div class="stat-card">
            <div class="stat-label">Distance</div>
            <div class="stat-value accent" id="statDistance">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Drive Time</div>
            <div class="stat-value" id="statDuration">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Fuel Stops</div>
            <div class="stat-value green" id="statStops">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Gallons</div>
            <div class="stat-value" id="statGallons">—</div>
          </div>
        </div>

        <div class="stops-header">Fuel Stops</div>
        <div id="stopsList"></div>
      </div>

    </div>
  </aside>

  <!-- ── Map ── -->
  <div id="mapContainer">
    <div class="map-placeholder" id="mapPlaceholder">
      <div class="map-placeholder-icon">🗺️</div>
      <div class="map-placeholder-text">Enter a start and destination to see your route</div>
    </div>
    <div id="map" style="display:none; height:100%;"></div>
  </div>
</main>

<script>
  let map = null;
  let selectedFuel = 'regular';
  let routeLayers = [];

  // Fuel tab switching
  document.querySelectorAll('.fuel-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.fuel-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      selectedFuel = tab.dataset.fuel;
    });
  });

  // Enter key support
  document.getElementById('start').addEventListener('keydown', e => e.key === 'Enter' && planRoute());
  document.getElementById('finish').addEventListener('keydown', e => e.key === 'Enter' && planRoute());

  document.getElementById('planBtn').addEventListener('click', planRoute);

  async function planRoute() {
    const start  = document.getElementById('start').value.trim();
    const finish = document.getElementById('finish').value.trim();
    const errorBox = document.getElementById('errorBox');

    errorBox.classList.remove('visible');

    if (!start || !finish) {
      showError('Please enter both a start and destination.');
      return;
    }

    const btn = document.getElementById('planBtn');
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/api/route/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ start, finish, fuel_type: selectedFuel }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Something went wrong. Check your API key and try again.');
        return;
      }

      renderResults(data);
      renderMap(data);

    } catch (err) {
      showError('Could not reach the server. Make sure the Django app is running.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function renderResults(data) {
    // Summary stats
    document.getElementById('totalCost').textContent    = `$${data.total_fuel_cost.toFixed(2)}`;
    document.getElementById('statDistance').textContent = `${data.total_distance_miles.toLocaleString()} mi`;
    document.getElementById('statDuration').textContent = `${data.total_duration_hours}h`;
    document.getElementById('statStops').textContent    = data.fuel_stops.length;
    document.getElementById('statGallons').textContent  = `${data.total_gallons} gal`;

    // Stops list
    const list = document.getElementById('stopsList');
    list.innerHTML = '';

    if (data.fuel_stops.length === 0) {
      list.innerHTML = `
        <div style="color:var(--text-muted);font-size:.85rem;padding:12px;text-align:center;">
          🎉 No stops needed — you can make it on one tank!
        </div>`;
    } else {
      data.fuel_stops.forEach(stop => {
        const card = document.createElement('div');
        card.className = 'stop-card';
        card.innerHTML = `
          <div class="stop-number">${stop.stop_number}</div>
          <div class="stop-body">
            <div class="stop-name">${stop.station_name}</div>
            <div class="stop-location">📍 ${stop.city}, ${stop.state}</div>
            <div class="stop-meta">
              <span class="stop-pill price">$${stop.price_per_gallon}/gal</span>
              <span class="stop-pill">mile ${stop.approx_mile_marker}</span>
              ${stop.address ? `<span class="stop-pill">${stop.address}</span>` : ''}
            </div>
          </div>
          <div class="stop-cost">
            <div class="stop-cost-value">$${stop.cost_at_stop.toFixed(2)}</div>
            <div class="stop-cost-gallons">${stop.gallons_to_fill} gal</div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    document.getElementById('results').classList.add('visible');
  }

  function renderMap(data) {
    // Show map, hide placeholder
    document.getElementById('mapPlaceholder').style.display = 'none';
    const mapEl = document.getElementById('map');
    mapEl.style.display = 'block';

    // Init or reset map
    if (!map) {
      map = L.map('map', { zoomControl: true, attributionControl: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
        maxZoom: 18,
      }).addTo(map);
    }

    // Clear previous layers
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];

    const coords = data.route_polyline; // [[lon, lat], ...]
    if (!coords || coords.length === 0) return;

    // Convert [lon, lat] → [lat, lon] for Leaflet
    const latlngs = coords.map(c => [c[1], c[0]]);

    // Route polyline — dashed road-stripe style
    const routeLine = L.polyline(latlngs, {
      color: '#f5c842',
      weight: 4,
      opacity: .85,
      dashArray: '10, 6',
      lineJoin: 'round',
    }).addTo(map);
    routeLayers.push(routeLine);

    // Solid underline for depth
    const routeBase = L.polyline(latlngs, {
      color: '#c49d28',
      weight: 7,
      opacity: .3,
    }).addTo(map);
    routeLayers.push(routeBase);

    // Start marker
    const startLatLng = latlngs[0];
    const startMarker = L.marker(startLatLng, {
      icon: L.divIcon({
        className: '',
        html: `<div class="endpoint-marker start"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7],
      })
    }).addTo(map);
    startMarker.bindPopup(`<b>🟢 Start</b><br>${data.start_location}`);
    routeLayers.push(startMarker);

    // End marker
    const endLatLng = latlngs[latlngs.length - 1];
    const endMarker = L.marker(endLatLng, {
      icon: L.divIcon({
        className: '',
        html: `<div class="endpoint-marker end"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7],
      })
    }).addTo(map);
    endMarker.bindPopup(`<b>🏁 Destination</b><br>${data.finish_location}`);
    routeLayers.push(endMarker);

    // Fuel stop markers
    const totalDist = data.total_distance_miles;
    data.fuel_stops.forEach(stop => {
      // Approximate position along polyline by mile marker fraction
      const fraction = stop.approx_mile_marker / totalDist;
      const idx = Math.min(Math.floor(fraction * latlngs.length), latlngs.length - 1);
      const pos = latlngs[idx];

      const marker = L.marker(pos, {
        icon: L.divIcon({
          className: '',
          html: `<div class="fuel-marker"><span>${stop.stop_number}</span></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 28],
        })
      }).addTo(map);

      marker.bindPopup(`
        <div style="font-family:'Space Grotesk',sans-serif;min-width:180px">
          <div style="font-weight:700;margin-bottom:4px">⛽ Stop ${stop.stop_number}</div>
          <div style="font-size:.85rem;font-weight:600">${stop.station_name}</div>
          <div style="font-size:.78rem;color:#666;margin-bottom:6px">${stop.city}, ${stop.state}</div>
          <div style="display:flex;gap:8px;font-size:.78rem">
            <span style="color:#3ddc84;font-weight:700">$${stop.price_per_gallon}/gal</span>
            <span style="color:#888">·</span>
            <span style="color:#f5c842;font-weight:700">$${stop.cost_at_stop.toFixed(2)} total</span>
          </div>
          <div style="font-size:.75rem;color:#888;margin-top:4px">Mile ${stop.approx_mile_marker}</div>
        </div>
      `);
      routeLayers.push(marker);
    });

    // Fit map to route
    map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
  }
</script>
